name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  static-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: test_pwd
          POSTGRES_DB: testdb
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 10s
          --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Lint (ступень 1)
        run: |
          ruff check .
          ruff format --check .

      - name: Typecheck (ступень 1)
        run: mypy src/

      - name: Unit tests (ступень 2)
        run: pytest tests/unit/ -v --cov=src --cov-report=term-missing

      - name: Integration tests (ступень 5)
        env:
          DATABASE_URL: postgresql+asyncpg://app:test_pwd@localhost:5432/testdb
        run: pytest tests/integration/ -v

      - name: Security — detect-secrets
        run: detect-secrets scan --all-files --baseline .secrets.baseline || true

      - name: Security — pip-audit
        run: pip-audit || true
